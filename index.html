<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MEHAD — Early Seizure Prediction Using Adaptive Learning and Multi-Modal Smartwatch Sensors."
    />
    <title>MEHAD</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main class="page">
      <div class="bg" aria-hidden="true">
        <div class="bg__blob bg__blob--a"></div>
        <div class="bg__blob bg__blob--b"></div>
        <div class="bg__blob bg__blob--c"></div>
        <div class="bg__grid"></div>
      </div>

      <section class="card" aria-label="MEHAD landing">
        <header class="hero">
          <h1 class="hero__title">MEHAD</h1>
          <p class="hero__subtitle">
            Early Seizure Prediction Using Adaptive Learning and
            <br />
            Multi-Modal Smartwatch Sensors
          </p>
        </header>

        <div class="actions" role="group" aria-label="Primary actions">
          <a
            class="btn btn--primary"
            href="https://www.youtube.com/watch?v=FmhhsBkT9nU"
            target="_blank"
            rel="noreferrer"
          >
            <span class="btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M9.25 8.75v6.5c0 .71.78 1.15 1.39.79l5.58-3.25a.91.91 0 0 0 0-1.58l-5.58-3.25c-.61-.36-1.39.08-1.39.79Z"
                  fill="currentColor"
                />
                <path
                  d="M12 21.5c5.25 0 9.5-4.25 9.5-9.5S17.25 2.5 12 2.5 2.5 6.75 2.5 12s4.25 9.5 9.5 9.5Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  opacity=".65"
                />
              </svg>
            </span>
            <span class="btn__label">Watch Project Video</span>
          </a>

          <a
            class="btn btn--secondary"
            href="https://github.com/Rnemel/mehad-app"
            target="_blank"
            rel="noreferrer"
            data-app-link
          >
            <span class="btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M13.5 5.75h4.75V10.5"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M10.5 13.5 18.1 5.9"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M10.75 6.75H9c-2.1 0-3.25 1.15-3.25 3.25V15c0 2.1 1.15 3.25 3.25 3.25h5c2.1 0 3.25-1.15 3.25-3.25v-1.75"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity=".7"
                />
              </svg>
            </span>
            <span class="btn__label">Open Project App</span>
          </a>

          <a
            class="btn btn--x btn--icon-only"
            href="https://x.com/mehadpredict?s=21&t=vtEO4I3nZLfKkg6viSzwTg"
            target="_blank"
            rel="noreferrer"
            aria-label="Open X page"
          >
            <span class="btn__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M13.8 10.3 20.6 2.5h-1.6l-5.9 6.8L8.4 2.5H3l7.1 10.3L3 21.5h1.6l6.2-7.2 4.9 7.2H21l-7.2-11.2ZM11.6 13 10.9 12 4.7 3.3h2.5l5 7.1.7 1 6.5 9.2h-2.4L11.6 13Z"
                  fill="currentColor"
                  opacity=".95"
                />
              </svg>
            </span>
          </a>
        </div>
      </section>
    </main>

    <script src="./script.js?v=3"></script>
  </body>
</html>
